description: EAiCoding agent retrieval and answer quality checks

prompts:
  - "{{question}}"

providers:
  - id: echo
    config:
      response: "{{question}}"

tests:
  - description: POST 案例应触发多实现比较
    vars:
      question: "帮我写一个POST请求案例"
    assert:
      - type: contains-any
        value:
          - "POST"
          - "网页_访问"

  - description: 多线程 POST 不能机械重复启动线程
    vars:
      question: "写个多线程POST案例"
    assert:
      - type: not-contains
        value: "启动线程(&线程POST,0)\n启动线程(&线程POST,0)\n启动线程(&线程POST,0)"

  - description: 项目优化必须走工具闭环
    vars:
      question: "分析这个 .e 项目并优化代码"
    assert:
      - type: contains-any
        value:
          - ".e"
          - "优化"
