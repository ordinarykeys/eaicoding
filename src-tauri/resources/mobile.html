<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>EAiCoding 手机模式</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface-high: #f8f8f8;
      --surface-pressed: #f0f0f2;
      --text: #000000;
      --muted: #8e8e93;
      --line: #eaeaea;
      --brand: #000000;
      --link: #2bacca;
      --assistant: transparent;
      --user: #f0eee6;
      --success: #34c759;
      --shadow: 0 8px 24px rgba(0, 0, 0, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: calc(env(safe-area-inset-top) + 6px) 8px 8px;
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }
    .topline {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) auto 40px;
      align-items: center;
      gap: 6px;
      min-height: 44px;
    }
    .logo {
      height: 32px;
      width: 32px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: #18171c;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
    }
    .title { min-width: 0; text-align: center; }
    .title b {
      display: block;
      font-size: 16px;
      font-weight: 650;
      line-height: 20px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .title span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 16px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      max-width: 78px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--muted);
      padding: 0 2px;
      font-size: 11px;
      justify-self: end;
    }
    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      flex: 0 0 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(52, 199, 89, .14);
    }
    .status.is-busy::before {
      background: #007aff;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, .14);
    }
    .status.is-offline::before {
      background: #8e8e93;
      box-shadow: none;
    }
    .icon-action {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 17px;
      background: transparent;
      color: #18171c;
      justify-self: end;
    }
    .icon-action svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .icon-action:active {
      transform: translateY(1px);
    }
    nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin: 6px 6px 0;
      padding: 4px;
      border-radius: 12px;
      background: var(--surface-pressed);
    }
    nav button {
      border: 0;
      border-radius: 9px;
      padding: 7px 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
    }
    nav button.active {
      background: #fff;
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
    }
    main {
      min-height: 0;
      overflow: auto;
      padding: 14px 0 116px;
    }
    .tab-view {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }
    .empty {
      margin: 22vh auto 0;
      max-width: 280px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .messages { display: flex; flex-direction: column; gap: 0; }
    .msg {
      max-width: 100%;
      font-size: 14px;
      line-height: 1.62;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .msg p {
      margin: 0 0 8px;
    }
    .msg p:last-child {
      margin-bottom: 0;
    }
    .msg.user {
      align-self: flex-end;
      max-width: calc(100% - 32px);
      margin: 0 16px 12px;
      padding: 7px 12px;
      background: var(--user);
      border-radius: 12px;
    }
    .msg.assistant {
      align-self: flex-start;
      width: 100%;
      max-width: 100%;
      margin: 0 0 12px;
      padding: 0 16px;
      background: transparent;
      border: 0;
      box-shadow: none;
    }
    .msg.assistant.with-rich-content {
      width: 100%;
      max-width: 100%;
      padding: 0 16px;
      background: transparent;
      border: 0;
      box-shadow: none;
      white-space: normal;
      overflow-wrap: normal;
    }
    .mobile-markdown {
      max-width: 100%;
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
    }
    .mobile-markdown > p,
    .mobile-markdown > ul,
    .mobile-markdown > ol,
    .mobile-markdown > blockquote,
    .mobile-markdown > h1,
    .mobile-markdown > h2,
    .mobile-markdown > h3 {
      margin: 0 0 10px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      overflow-wrap: anywhere;
    }
    .mobile-markdown > p:last-child,
    .mobile-markdown > ul:last-child,
    .mobile-markdown > ol:last-child,
    .mobile-markdown > blockquote:last-child,
    .mobile-markdown > h1:last-child,
    .mobile-markdown > h2:last-child,
    .mobile-markdown > h3:last-child,
    .mobile-markdown > .overflow-x-auto:last-child {
      margin-bottom: 0;
    }
    .mobile-markdown h1 {
      font-size: 20px;
      line-height: 1.35;
      font-weight: 800;
    }
    .mobile-markdown h2 {
      font-size: 18px;
      line-height: 1.4;
      font-weight: 750;
    }
    .mobile-markdown h3 {
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
    }
    .mobile-markdown ul,
    .mobile-markdown ol {
      padding-left: 32px;
    }
    .mobile-markdown ul {
      list-style: disc;
    }
    .mobile-markdown ol {
      list-style: decimal;
    }
    .mobile-markdown li {
      margin: 2px 0;
    }
    .mobile-markdown blockquote {
      color: var(--muted);
      font-style: italic;
      border-left: 4px solid rgba(15, 23, 42, .16);
      padding-left: 12px;
    }
    .mobile-markdown a {
      color: var(--brand);
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-all;
    }
    .mobile-markdown code {
      border-radius: 5px;
      background: rgba(0, 0, 0, .06);
      color: #000000;
      padding: 2px 5px;
      font-family: "Cascadia Mono", Consolas, "Courier New", monospace;
      font-size: .86em;
    }
    .mobile-markdown .overflow-x-auto {
      margin: 0 0 10px;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      -webkit-overflow-scrolling: touch;
    }
    .mobile-markdown table {
      min-width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      white-space: nowrap;
    }
    .mobile-markdown th {
      border: 1px solid var(--line);
      background: var(--surface-high);
      padding: 6px 8px;
      text-align: left;
      font-weight: 600;
    }
    .mobile-markdown td {
      border: 1px solid var(--line);
      padding: 6px 8px;
    }
    .mobile-markdown .relative.group {
      width: 100%;
      max-width: 100%;
      margin: 10px 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      color: #000000;
      box-shadow: none;
    }
    .mobile-markdown .relative.group > div:first-child {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-high);
      color: var(--muted);
      font-size: 12px;
    }
    .mobile-markdown .relative.group button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: inherit;
      padding: 2px 8px;
      font-size: 12px;
    }
    .mobile-markdown .relative.group > div:last-child {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .mobile-markdown pre {
      margin: 0;
      padding: 12px;
      overflow-x: auto;
      background: #ffffff;
      color: #000000;
      font-family: "Cascadia Mono", Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre;
    }
    .mobile-markdown pre code {
      display: block;
      background: transparent;
      color: inherit;
      padding: 0;
      border-radius: 0;
      font-size: inherit;
    }
    .msg.assistant.with-rich-content > p {
      margin: 0 0 10px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .session button {
      min-width: 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      padding: 12px 14px;
      font-size: 13px;
      text-align: left;
      box-shadow: none;
    }
    .session {
      display: grid;
      margin: 0 12px;
      overflow: hidden;
      border-radius: 16px;
      background: var(--surface);
    }
    .session button:last-child { border-bottom: 0; }
    .session button.active { background: var(--surface-pressed); }
    .session small { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; }
    .code, .logs {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      color: #000000;
      overflow: hidden;
      box-shadow: none;
      margin: 0 12px;
    }
    .code-title, .log-title {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }
    .code-body {
      padding: 10px;
      overflow: auto;
      max-height: 68vh;
      -webkit-overflow-scrolling: touch;
    }
    .epl-renderer-shell {
      width: 100%;
      margin: 10px 0;
      overflow: hidden;
      border-radius: 0;
      box-shadow: none;
    }
    .mobile-markdown .epl-renderer-shell {
      max-width: 100%;
    }
    .epl-renderer-header {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #999999;
      border-bottom: 0;
      background: #2c3036;
      color: #d6d6d6;
      font-size: 12px;
      padding: 6px 10px;
      white-space: nowrap;
    }
    .epl-renderer-tag {
      border: 1px solid rgba(255, 255, 255, .15);
      background: rgba(255, 255, 255, .08);
      padding: 1px 6px;
      font-size: 11px;
    }
    .mobile-chat-epl-body {
      overflow: auto;
      border: 1px solid #999999;
      background: #ffffff;
      -webkit-overflow-scrolling: touch;
    }
    .code-body .epl-renderer-shell {
      margin: 0;
      box-shadow: none;
    }

    .steps { display: grid; gap: 8px; }
    .step {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 11px 12px;
      margin: 0 12px;
    }
    .step b { display: block; font-size: 13px; }
    .step span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 8px 12px calc(env(safe-area-inset-bottom) + 8px);
      background: rgba(245, 245, 245, .96);
      border-top: 0;
      backdrop-filter: blur(18px);
    }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 8px;
      max-width: 720px;
      margin: 0 auto;
      padding: 8px;
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 1px 8px rgba(0, 0, 0, .05);
    }
    textarea {
      width: 100%;
      max-height: 128px;
      min-height: 36px;
      resize: none;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      padding: 8px 6px 8px 8px;
      font: 14px/20px inherit;
      outline: none;
      box-shadow: none;
    }
    .send {
      height: 32px;
      width: 32px;
      border: 0;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: #000000;
      color: #fff;
      font-weight: 700;
    }
    .send svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .send:disabled { opacity: .45; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topline">
        <div class="logo">E</div>
        <div class="title">
          <b id="sessionTitle">EAiCoding 手机模式</b>
          <span id="subtitle">连接桌面端中...</span>
        </div>
        <button class="icon-action" id="newSession" aria-label="新建会话" title="新建会话">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <div class="status" id="status">待机</div>
      </div>
      <nav>
        <button data-tab="chat" class="active">对话</button>
        <button data-tab="code">代码</button>
        <button data-tab="steps">过程</button>
        <button data-tab="sessions">会话</button>
      </nav>
    </header>
    <main id="main"></main>
    <footer>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="躺着也能继续写代码"></textarea>
        <button id="send" class="send" aria-label="发送" title="发送">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get("token") || "";
    const main = document.getElementById("main");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const statusEl = document.getElementById("status");
    const titleEl = document.getElementById("sessionTitle");
    const subtitleEl = document.getElementById("subtitle");
    const newSession = document.getElementById("newSession");
    let state = { sessions: [], messages: [], previewItems: [], steps: [], isStreaming: false };
    let tab = "chat";

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function api(path, options = {}) {
      const sep = path.includes("?") ? "&" : "?";
      const response = await fetch(path + sep + "token=" + encodeURIComponent(token), {
        ...options,
        headers: { "content-type": "application/json", ...(options.headers || {}) },
      });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    }

    async function postAction(action) {
      await api("/api/actions", { method: "POST", body: JSON.stringify(action) });
    }

    function activeSession() {
      return state.sessions.find((item) => item.id === state.activeSessionId) || state.sessions[0] || null;
    }

    function setTab(next) {
      tab = next;
      document.querySelectorAll("nav button").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tab);
      });
      render();
    }

    document.querySelectorAll("nav button").forEach((button) => {
      button.addEventListener("click", () => setTab(button.dataset.tab));
    });

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(128, input.scrollHeight) + "px";
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    send.addEventListener("click", sendMessage);
    newSession.addEventListener("click", () => postAction({ type: "new_session" }));

    async function sendMessage() {
      const content = input.value.trim();
      if (!content || state.isStreaming) return;
      input.value = "";
      input.style.height = "auto";
      send.disabled = true;
      try {
        await postAction({ type: "send_message", content });
      } finally {
        setTimeout(() => (send.disabled = false), 500);
      }
    }

    async function refresh() {
      try {
        const payload = await api("/api/state");
        state = payload.snapshot || state;
        const session = activeSession();
        titleEl.textContent = session ? session.title : "EAiCoding 手机模式";
        subtitleEl.textContent = state.isStreaming ? (state.statusLine || "桌面端正在处理") : "桌面端在线";
        statusEl.textContent = state.isStreaming ? "处理中" : "在线";
        statusEl.classList.toggle("is-busy", !!state.isStreaming);
        statusEl.classList.remove("is-offline");
        send.disabled = !!state.isStreaming;
        render();
      } catch (error) {
        statusEl.textContent = "断开";
        statusEl.classList.remove("is-busy");
        statusEl.classList.add("is-offline");
        subtitleEl.textContent = "连接失败，请检查桌面端手机模式";
      }
    }

    function render() {
      if (tab === "chat") return renderChat();
      if (tab === "code") return renderCode();
      if (tab === "steps") return renderSteps();
      return renderSessions();
    }

    function renderChat() {
      const messages = (state.messages || []).slice(-60);
      main.innerHTML = `
        <div class="tab-view">
        ${messages.length ? `<div class="messages">${messages.map((message) => `
          <div class="msg ${message.role === "user" ? "user" : "assistant"} ${message.html ? "with-rich-content" : ""}">${message.html || esc(message.content || "")}</div>`).join("")}</div>` : `<div class="empty">手机已连接。这里发送的每句话都会进入桌面端同一个 AI Coding 流程。</div>`}
        </div>
      `;
      requestAnimationFrame(() => {
        main.querySelectorAll(".epl-renderer").forEach((root) => applyIdeFlowLayout(root));
      });
      main.scrollTop = main.scrollHeight;
    }

    function renderCode() {
      const item = (state.previewItems || [])[0];
      if (!item) {
        main.innerHTML = `<div class="tab-view"><div class="empty">桌面端提取或生成易语言代码后，会在这里同步显示。</div></div>`;
        return;
      }
      main.innerHTML = `<div class="tab-view"><div class="code"><div class="code-title">${esc(item.title || "易语言代码")}</div><div class="code-body">${item.html || `<pre>${esc(item.code || "")}</pre>`}</div></div></div>`;
      requestAnimationFrame(() => {
        main.querySelectorAll(".epl-renderer").forEach((root) => applyIdeFlowLayout(root));
      });
    }

    function resetIdeLine(el) {
      if (!el) return;
      el.removeAttribute("style");
      el.querySelectorAll(".triangle-right, .triangle-down, .line3, .line4").forEach((child) => child.removeAttribute("style"));
    }

    function showArrow(parent, selector) {
      const arrow = parent && parent.querySelector(selector);
      if (arrow) arrow.style.display = "block";
    }

    function getDirectLine(ul, selector) {
      for (const child of Array.from(ul.children)) {
        if (child.classList && child.classList.contains(selector.slice(1))) return child;
      }
      return null;
    }

    function directParagraph(element) {
      if (!element) return null;
      if (element.tagName === "P") return element;
      for (const child of Array.from(element.children)) {
        if (child.tagName === "P") return child;
      }
      return null;
    }

    function directCommand(element, selector = ".sysCommand") {
      const p = directParagraph(element);
      if (!p) return null;
      for (const child of Array.from(p.children)) {
        if (child.matches && child.matches(selector)) return child;
      }
      return null;
    }

    function isDirectCommand(element, selector) {
      return Boolean(directCommand(element, selector));
    }

    function applyIdeFlowLayout(root) {
      const blocks = Array.from(root.querySelectorAll("ul.epl-ide-block"));
      blocks.forEach((block) => {
        resetIdeLine(getDirectLine(block, ".line1"));
        resetIdeLine(getDirectLine(block, ".line2"));
        block.querySelectorAll(".judgeChild .line1, .judgeChild .line2").forEach(resetIdeLine);
      });

      blocks.forEach((block) => {
        const children = Array.from(block.children).filter((child) => child instanceof HTMLElement);
        const line1 = getDirectLine(block, ".line1");
        const line2 = getDirectLine(block, ".line2");
        const firstCode = children[2];
        const close = children[children.length - 1];
        if (!line1 || !line2 || !firstCode || !close) return;

        const isCycle = block.classList.contains("epl-ide-cycle");
        const isIfTrue = block.classList.contains("epl-ide-if-true");
        const isIf = block.classList.contains("epl-ide-if");
        const isJudge = block.classList.contains("epl-ide-judge");
        const directItems = children.slice(3, -1);
        const defItem = directItems.find((item) => isDirectCommand(item, ".def")) || null;
        const judgeChildren = directItems.filter((item) => isDirectCommand(item, ".judgeChild"));

        if (isCycle) {
          line1.style.top = "10px";
          line1.style.height = `${Math.max(0, block.clientHeight - 20)}px`;
          showArrow(line1, ".triangle-right");
          const arrow = line1.querySelector(".triangle-right");
          if (arrow) arrow.style.top = "-5px";
          return;
        }

        if (isIfTrue) {
          line1.style.display = "none";
          line2.style.display = "block";
          line2.style.left = "2px";
          line2.style.width = "15px";
          line2.style.top = "10px";
          line2.style.height = `${Math.max(0, close.offsetTop + close.offsetHeight - 10)}px`;
          showArrow(line2, ".triangle-down");
          return;
        }

        if (isIf) {
          const target = defItem || close;
          line1.style.top = "10px";
          line1.style.height = `${Math.max(0, target.offsetTop)}px`;
          showArrow(line1, ".triangle-right");
          const right = line1.querySelector(".triangle-right");
          if (right) right.style.bottom = "-5px";

          line2.style.display = "block";
          line2.style.top = `${Math.max(0, target.offsetTop - 10)}px`;
          line2.style.height = `${Math.max(0, close.offsetTop - target.offsetTop + close.offsetHeight + 10)}px`;
          showArrow(line2, ".triangle-down");
          return;
        }

        if (isJudge) {
          const fallbackDef = defItem || close;
          line1.style.top = "10px";
          line1.style.height = `${Math.max(0, (judgeChildren[0] || fallbackDef).offsetTop)}px`;
          showArrow(line1, ".triangle-right");
          const right = line1.querySelector(".triangle-right");
          if (right) right.style.bottom = "-5px";

          if (judgeChildren.length || defItem) {
            line2.style.display = "block";
            const topItem = judgeChildren[0] || fallbackDef;
            line2.style.top = `${Math.max(0, topItem.offsetTop - 10)}px`;
            line2.style.height = `${Math.max(0, close.offsetTop - topItem.offsetTop + close.offsetHeight + 10)}px`;
            showArrow(line2, ".triangle-down");
          }

          judgeChildren.forEach((item, index) => {
            const marker = directCommand(item, ".judgeChild");
            const branchLine1 = marker && marker.querySelector(".line1");
            if (!branchLine1) return;
            const next = judgeChildren[index + 1] || defItem || close;
            branchLine1.style.display = "block";
            branchLine1.style.left = "-20px";
            branchLine1.style.top = "14px";
            branchLine1.style.height = `${Math.max(8, next.offsetTop - item.offsetTop - 10)}px`;
            showArrow(branchLine1, ".triangle-right");
            const branchRight = branchLine1.querySelector(".triangle-right");
            if (branchRight) branchRight.style.bottom = "-5px";
          });
        }
      });
    }

    function renderSteps() {
      const steps = state.steps || [];
      if (!steps.length) {
        main.innerHTML = `<div class="tab-view"><div class="empty">开始一次 AI Coding 后，这里会同步显示工具调用、编译和处理过程。</div></div>`;
        return;
      }
      main.innerHTML = `<div class="tab-view"><div class="steps">${steps.map((step) => `
        <div class="step"><b>第 ${esc(step.index)} 步 · ${esc(step.label || "")}</b><span>${esc(step.detail || "")}</span></div>
      `).join("")}</div></div>`;
    }

    function renderSessions() {
      const sessions = state.sessions || [];
      main.innerHTML = `
        <div class="tab-view">
        <div class="session">
          ${sessions.map((session) => `
            <button data-session="${esc(session.id)}" class="${session.id === state.activeSessionId ? "active" : ""}">
              ${esc(session.title)}<small>${esc(session.lastMessagePreview || "暂无消息")}</small>
            </button>
          `).join("")}
        </div>
        </div>
      `;
      main.querySelectorAll("[data-session]").forEach((button) => {
        button.addEventListener("click", () => postAction({ type: "set_active_session", sessionId: button.dataset.session }));
      });
    }

    refresh();
    setInterval(refresh, 1100);
  </script>
</body>
</html>
